<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Santiago Silva Avalos — Applied Mathematician</title>
<meta name="description" content="Santiago Silva Avalos — applied mathematician building AI systems and computational research. Bayesian modeling, agentic systems, spatial statistics.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f3ef; --panel:#faf9f6; --ink:#111111; --muted:#5f5f5a; --faint:#98968d;
    --line:#ddd9cf; --line2:#e9e6dd; --black:#111111;
    --accent:#e5352b; --yellow:#ffc300;
    --sans:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --mono:"Geist Mono","SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  @media (prefers-color-scheme:dark){
    :root{ --paper:#161514; --panel:#1c1b19; --ink:#ededea; --muted:#a19e95; --faint:#6f6c63;
           --line:#2f2d29; --line2:#252320; --black:#000000; }
  }
  :root[data-theme="light"]{ --paper:#f4f3ef; --panel:#faf9f6; --ink:#111; --muted:#5f5f5a; --faint:#98968d; --line:#ddd9cf; --line2:#e9e6dd; --black:#111; }
  :root[data-theme="dark"]{ --paper:#161514; --panel:#1c1b19; --ink:#ededea; --muted:#a19e95; --faint:#6f6c63; --line:#2f2d29; --line2:#252320; --black:#000; }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:17px;
       line-height:1.55; font-weight:400; -webkit-font-smoothing:antialiased; overflow-x:hidden;
       transition:background .4s var(--ease), color .4s var(--ease)}
  .wrap{max-width:1080px; margin:0 auto; padding:0 30px}
  a{color:inherit}
  :focus-visible{outline:3px solid var(--accent); outline-offset:2px}
  .skip{position:absolute; left:-9999px; top:0; background:var(--ink); color:var(--paper);
        font-family:var(--mono); font-size:12px; padding:10px 14px; z-index:100}
  .skip:focus{left:8px; top:8px}
  .lbl{font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; font-weight:500}

  /* control bar */
  .bar{position:sticky; top:0; z-index:40; background:color-mix(in srgb,var(--paper) 88%,transparent);
       backdrop-filter:saturate(140%) blur(9px); border-bottom:4px solid var(--ink)}
  .bar .wrap{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:11px 30px}
  .bar .id{display:flex; align-items:center; gap:9px}
  .bar .id .chip{width:13px; height:13px; background:var(--accent); transition:background .45s var(--ease)}
  .bar .id .txt{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted)}
  .controls{display:flex; align-items:center; gap:9px; flex-wrap:wrap; justify-content:flex-end}
  .seg{display:inline-flex; border:2.5px solid var(--ink); background:var(--panel)}
  .seg button{font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
              border:0; background:transparent; color:var(--muted); padding:7px 12px; cursor:pointer; transition:.16s}
  .seg button[aria-pressed="true"]{background:var(--ink); color:var(--paper)}
  #lens button[data-lens="industry"][aria-pressed="true"]{background:#e5352b; color:#fff}
  #lens button[data-lens="research"][aria-pressed="true"]{background:#1e52a8; color:#fff}
  .seg button:hover:not([aria-pressed="true"]){color:var(--ink)}
  .icon-btn{font-family:var(--mono); font-size:13px; border:2.5px solid var(--ink); background:var(--panel);
            color:var(--muted); width:36px; height:34px; cursor:pointer; transition:.16s}
  .icon-btn:hover{color:var(--ink)}

  /* ── compact hero ── */
  .hero .wrap{padding-top:46px; padding-bottom:34px}
  .hero-id{display:flex; align-items:center; gap:16px}
  .avatar{position:relative; width:56px; height:56px; flex:0 0 auto; overflow:visible}
  .avatar-disc{position:absolute; inset:0; border-radius:50%; background:var(--accent);
               box-shadow:0 0 0 3px var(--paper), 0 0 0 5px var(--accent); transition:background .45s var(--ease), box-shadow .45s var(--ease)}
  .avatar-ph{position:absolute; left:50%; bottom:-1px; transform:translateX(-50%); width:70px; height:auto; z-index:1; pointer-events:none}
  .name{font-family:var(--sans); font-weight:800; font-size:clamp(28px,4.6vw,44px); letter-spacing:-.02em; line-height:1; margin:0}
  .title{font-family:var(--mono); font-size:12.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:7px 0 0}
  .hero-desc{max-width:56ch; font-size:19px; color:var(--ink); margin:22px 0 0; line-height:1.5}
  .hero-desc .hl{font-weight:700; box-shadow:inset 0 -.42em 0 color-mix(in srgb,var(--accent) 42%,transparent); transition:box-shadow .45s var(--ease)}
  .hero-actions{display:flex; gap:9px; flex-wrap:wrap; margin-top:22px}

  /* action buttons (shared) */
  .act{font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
       text-decoration:none; padding:9px 13px; border:2.5px solid var(--ink); transition:.16s; display:inline-flex; align-items:center; gap:6px; cursor:pointer}
  .act::after{content:"↗"; font-size:10px; opacity:.7}
  .act.filled{background:var(--accent); color:#fff; border-color:var(--accent)}
  .act.filled:hover{filter:brightness(1.09)}
  .act.outline{color:var(--ink); background:transparent}
  .act.outline:hover{background:var(--ink); color:var(--paper)}
  .act.muted{color:var(--faint); border:2.5px dashed var(--line)}
  .act.muted::after{content:""}

  /* stats */
  .stats{display:flex; flex-wrap:wrap; margin-top:26px; border:3px solid var(--ink)}
  .stat{flex:1 1 0; min-width:130px; padding:15px 18px; border-right:3px solid var(--ink)}
  .stat:last-child{border-right:0}
  .stat .v{font-family:var(--sans); font-weight:800; font-size:27px; letter-spacing:-.02em; line-height:1}
  .stat .l{font-family:var(--mono); font-size:10px; letter-spacing:.11em; text-transform:uppercase; color:var(--muted); margin-top:7px}

  /* split accent bar */
  .splitbar{display:flex; height:18px}
  .splitbar .a{flex:0 0 72%; background:var(--accent); transition:background .45s var(--ease)}
  .splitbar .b{flex:1; background:var(--ink)}

  /* section head */
  .sec-head{display:flex; align-items:baseline; gap:16px; margin:58px 0 4px}
  .sec-head h2{font-family:var(--sans); font-weight:800; text-transform:uppercase; letter-spacing:.01em;
               font-size:clamp(20px,3.6vw,30px); margin:0}
  .sec-head .count{font-family:var(--mono); font-size:13px; color:var(--faint); margin-left:auto}
  .lens-note{font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.02em; margin:6px 0 0; max-width:72ch}

  .list-wrap{position:relative; margin-top:26px; padding-left:30px}
  .list-wrap > #featured-list, .list-wrap > #selected-list{position:relative; z-index:1}
  .spine{position:absolute; left:0; top:0; bottom:0; width:10px; background:var(--yellow); transform-origin:top; z-index:1}

  .proj{display:grid; grid-template-columns:64px 1fr; gap:6px 22px; padding:30px 0; border-top:4px solid var(--ink); align-items:start}
  .proj:first-child{border-top:none}
  .proj-rail{display:flex; flex-direction:column; gap:11px; padding-top:5px}
  .proj-rail .num{font-family:var(--mono); font-size:12.5px; font-weight:600; color:var(--muted)}
  .proj-rail .sq{width:18px; height:18px; background:var(--accent); transition:background .45s var(--ease)}
  .proj.selected .proj-rail .sq{width:12px; height:12px; background:var(--yellow)}
  .body{min-width:0}
  .ptop{display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap}
  .ptitle{font-family:var(--sans); font-weight:700; line-height:1.08; letter-spacing:-.015em; margin:0}
  .proj.featured .ptitle{font-size:clamp(25px,3.6vw,34px)}
  .proj.selected .ptitle{font-size:clamp(20px,2.7vw,25px)}
  .year{font-family:var(--mono); font-size:12px; color:var(--faint); white-space:nowrap}
  .line{font-weight:600; font-size:18px; color:var(--accent); margin:9px 0 0; line-height:1.34; transition:color .45s var(--ease)}
  .blurb{color:var(--muted); margin:12px 0 0; max-width:66ch; font-size:15.5px}

  /* hackathon award badge */
  .award{display:inline-flex; align-items:center; gap:11px; margin:14px 0 0; padding:7px 15px 7px 7px;
         border:2.5px solid var(--accent); background:color-mix(in srgb,var(--accent) 9%,transparent); overflow:visible;
         transition:border-color .45s var(--ease), background .45s var(--ease)}
  .award-ic{position:relative; width:46px; height:27px; flex:0 0 auto; transition:transform .26s cubic-bezier(.34,1.56,.64,1)}
  .award-ic .mi{position:absolute; left:0; bottom:0; width:46px; height:auto; transition:opacity .12s ease}
  .award-ic .mi-jump{opacity:0; width:55px; left:-5px}  /* scaled so head↔feet match idle (goggles 243 vs 204px) */
  .award:hover{background:color-mix(in srgb,var(--accent) 14%,transparent)}
  .award:hover .award-ic{transform:translateY(-9px)}
  .award:hover .mi-idle{opacity:0}
  .award:hover .mi-jump{opacity:1}
  @media (prefers-reduced-motion:reduce){ .award:hover .award-ic{transform:none} }
  .award-tx{display:flex; flex-direction:column; gap:2px}
  .award-t{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink)}
  .award-r{font-family:var(--mono); font-size:11px; letter-spacing:.03em; color:var(--accent); transition:color .45s var(--ease)}

  /* featured rich content */
  .rich{display:grid; grid-template-columns:1fr 1fr; gap:16px 28px; margin:18px 0 0}
  .rich .rk{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); display:block; margin-bottom:5px; transition:color .45s var(--ease)}
  .rich p{margin:0; font-size:15.5px; color:var(--ink); line-height:1.5}
  .highlights{list-style:none; padding:0; margin:16px 0 0; display:flex; flex-direction:column; gap:6px}
  .highlights li{font-family:var(--mono); font-size:12px; color:var(--muted); padding-left:17px; position:relative; line-height:1.45}
  .highlights li::before{content:"\25a0"; position:absolute; left:0; top:2px; color:var(--accent); font-size:8px; transition:color .45s var(--ease)}

  .tags{display:flex; flex-wrap:wrap; gap:7px; margin:18px 0 0}
  .tag{font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); border:2px solid var(--line); padding:4px 9px}
  .links{display:flex; flex-wrap:wrap; gap:9px; margin:18px 0 0}

  .figure{margin:22px 0 0; border:3px solid var(--ink); background:var(--panel)}
  .figure img{display:block; width:100%; height:auto}
  .figure video.vid{display:block; width:100%; height:auto; background:#0d1117}
  /* interactive map with click-to-interact overlay */
  .map-fig .map-holder{position:relative}
  .mapframe{display:block; width:100%; height:460px; border:0; background:#e8e8e8}
  .map-holder:not(.active) .mapframe{pointer-events:none}
  .map-overlay{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; border:0;
    cursor:pointer; background:color-mix(in srgb,#0d1117 14%,transparent); transition:background .18s ease}
  .map-overlay:hover{background:color-mix(in srgb,#0d1117 22%,transparent)}
  .map-overlay .chip{font-family:var(--mono); font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
    color:#fff; background:#14161c; border:2.5px solid #14161c; padding:11px 16px}
  .map-holder.active .map-overlay{display:none}
  .map-lock{position:absolute; top:10px; right:10px; display:none; align-items:center; gap:6px; cursor:pointer; z-index:5;
    font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
    color:#fff; background:#14161c; border:2.5px solid #14161c; padding:7px 11px}
  .map-holder.active .map-lock{display:inline-flex}
  @media (max-width:640px){ .mapframe{height:340px} }
  .figure figcaption{font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.03em; padding:9px 13px; border-top:3px solid var(--ink)}
  .media-ph{margin:22px 0 0; border:3px dashed var(--line); background:var(--panel); padding:38px 20px; text-align:center}
  .media-ph .t{font-family:var(--mono); font-size:11px; letter-spacing:.11em; text-transform:uppercase; color:var(--faint)}

  /* also */
  .also{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:0 30px; margin:22px 0 0; border-top:4px solid var(--ink)}
  .also a{text-decoration:none; display:block}
  .also .row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; padding:15px 0; border-bottom:2px solid var(--line)}
  .also .n{font-weight:600; font-size:15.5px}
  .also .d{font-family:var(--mono); font-size:10.5px; color:var(--faint); text-align:right; letter-spacing:.03em; max-width:17ch}
  .also a:hover .n{color:var(--accent)}

  /* footer (simple) */
  footer .wrap{padding-top:26px; padding-bottom:56px; margin-top:66px; border-top:6px solid var(--ink)}
  .foot-line{font-weight:600; font-size:17px; color:var(--ink); max-width:46ch; margin:0 0 22px}
  .fl{display:flex; gap:9px; flex-wrap:wrap; margin-bottom:24px}
  .colophon{font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.06em; text-transform:uppercase}
  .colophon .mk{color:var(--accent)}

  /* decorative shape (kept: one) */
  .shape{position:absolute; z-index:0; pointer-events:none; opacity:0; transition:opacity 1s var(--ease);
         transform:translate3d(var(--px,0px),var(--py,0px),0); will-change:transform,opacity; background:var(--accent)}
  .shape.in{opacity:.92}
  .accent-square{width:110px; height:110px; right:2%; top:-46px; transform:rotate(8deg)}

  /* reveal (sideways) */
  .reveal{opacity:0; transform:translateX(-54px); transition:opacity .65s var(--ease), transform .8s var(--ease)}
  .reveal.r{transform:translateX(54px)}
  .reveal.in{opacity:1; transform:none}
  .spine{opacity:0; transform:scaleY(0); transition:opacity .6s var(--ease), transform 1.1s var(--ease)}
  .spine.in{opacity:1; transform:scaleY(1)}

  @media (prefers-reduced-motion:reduce){
    .shape,.reveal,.spine{opacity:1!important; transform:none!important; transition:none!important}
    .shape{opacity:.92!important}
    body{transition:none}
  }
  @media (max-width:640px){
    .proj{grid-template-columns:1fr; gap:2px}
    .proj-rail{flex-direction:row; align-items:center; gap:12px}
    .rich{grid-template-columns:1fr}
    .stat{border-right:0; border-bottom:3px solid var(--ink)}
    .stat:last-child{border-bottom:0}
    .accent-square{width:66px; height:66px; top:-24px}
  }
</style>
</head>

<main id="featured">

  </div>
</main>

<footer>

</footer>

/* ─────────── render helpers ─────────── */
function applyAccent(){ document.documentElement.style.setProperty("--accent", ACCENT[state.lens]); }

function renderContact(items){
  const c = UI[state.lang].contact;
  return items.map(i=>`<a class="act ${i.cls}" href="${i.href}"${i.k==="cv"?' target="_blank" rel="noopener"':""}>${c[i.k]}</a>`).join("");
}

function renderStats(){
  const L = state.lang;
  document.getElementById("stats").innerHTML = STATS.map(s=>
    `<div class="stat"><div class="v">${s.v}</div><div class="l">${s.l[L]}</div></div>`).join("");

function renderAward(aw, L){
  return `<div class="award"><span class="award-ic">
      <img class="mi mi-idle" src="${aw.icon}" alt="Built with Claude: Life Sciences hackathon mascot" loading="lazy">
      <img class="mi mi-jump" src="${aw.iconHover}" alt="" aria-hidden="true" loading="lazy"></span>
    <span class="award-tx"><span class="award-t">${aw[L].t}</span><span class="award-r">${aw[L].r}</span></span></div>`;
}

function renderActions(actions){
  const a = UI[state.lang].act;
  return actions.map(x=>{
    if(x.type==="Private") return `<span class="act muted">${a.Private}</span>`;
    const cls = FILLED.has(x.type) ? "filled" : "outline";
    return `<a class="act ${cls}" href="${x.href}" target="_blank" rel="noopener">${a[x.type]}</a>`;
  }).join("");
}

function renderFigure(p, L){
  if(p.map){
    const u = UI[L];
    return `<figure class="figure map-fig"><div class="map-holder">
      <iframe class="mapframe" src="${p.map}" loading="lazy" title="${p.figcap[L]}"></iframe>
      <button class="map-overlay" type="button" data-map="${p.map}">
        <span class="chip">▶ ${u.interact}</span></button>
      <button class="map-lock" type="button" aria-label="${u.lock}">${u.lock} ✕</button>
    </div><figcaption>${p.figcap[L]} · <a href="${p.map}" target="_blank" rel="noopener">${u.openmap} ↗</a></figcaption></figure>`;
  }
  if(p.video){
    return `<figure class="figure"><video class="vid" src="${p.video}" poster="${p.poster||""}"
      autoplay muted loop playsinline preload="metadata" aria-label="${p.figcap[L]}"></video>
      <figcaption>${p.figcap[L]}</figcaption></figure>`;
  }
  if(p.media==="soon"){
    return `<div class="media-ph"><span class="t">${UI[L].soon}</span></div>`;
  }
  if(p.fig){
    return `<figure class="figure"><img src="${p.fig}" alt="${p.alt[L]}" loading="lazy">
      <figcaption>${p.figcap[L]}</figcaption></figure>`;
  }
  return "";
}

function renderProject(p, i, N, L, X){
  const num = `${String(i+1).padStart(2,"0")} / ${N}`;
  const cls = p.featured ? "featured" : "selected";
  const tags = p.tags.map(t=>`<span class="tag">${t}</span>`).join("");
  const links = renderActions(p.actions);
  let mid = "";
  if(p.featured){
    const u = UI[L];
    const hi = p.highlights[L].map(h=>`<li>${h}</li>`).join("");
    mid = `<div class="rich">
        <div><span class="rk">${u.built}</span><p>${p.built[L]}</p></div>
        <div><span class="rk">${u.result}</span><p>${p.result[L]}</p></div>
      </div>
      <ul class="highlights">${hi}</ul>`;
  } else {
    mid = `<p class="blurb">${p.blurb[L]}</p>`;
  }
  const dir = i%2 ? " r" : "";
  return `<article class="proj ${cls} reveal${dir}">
      <div class="proj-rail"><span class="num">${num}</span><span class="sq" aria-hidden="true"></span></div>
      <div class="body">
        <div class="ptop"><h3 class="ptitle">${p.title}</h3><span class="year">${p.year}</span></div>
        <p class="line">${p.line[L][X]}</p>
        ${p.award ? renderAward(p.award, L) : ""}
        ${mid}
        <div class="tags">${tags}</div>
        <div class="links">${links}</div>
        ${renderFigure(p, L)}
      </div>
    </article>`;
}

function renderProjectSection(featured){

  const N = String(items.length).padStart(2,"0");
  const html = items.map((p,i)=>renderProject(p,i,N,L,X)).join("");
  document.getElementById(featured?"featured-list":"selected-list").innerHTML = html;
  document.getElementById(featured?"featured-count":"selected-count").textContent = N;

  const u = UI[state.lang], X = state.lens;

  applyAccent();
  document.getElementById("featured-title").textContent = u.featured;
  document.getElementById("selected-title").textContent = u.selected;
  document.getElementById("also-title").textContent = u.also;
  document.getElementById("lens-note").innerHTML = u.note[X];
  renderHero(); renderStats();
  renderProjectSection(true); renderProjectSection(false);
  renderAlso();
  observeReveal();
}

/* ─────────── motion ─────────── */
let io;
function observeReveal(){
  if(io) io.disconnect();
  io = new IntersectionObserver((es)=>es.forEach(e=>e.target.classList.toggle("in", e.isIntersecting)),
    {threshold:0.14, rootMargin:"0px 0px -8% 0px"});
  document.querySelectorAll(".reveal,.shape,.spine").forEach(t=>io.observe(t));
}

const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
if(!reduce){
  let mx=0,my=0,tx=0,ty=0,ticking=false;
  window.addEventListener("pointermove",(e)=>{
    mx=e.clientX/window.innerWidth-0.5; my=e.clientY/window.innerHeight-0.5;
    if(!ticking){ ticking=true; requestAnimationFrame(loop); }
  },{passive:true});
  function loop(){
    tx+=(mx-tx)*0.09; ty+=(my-ty)*0.09;
    document.querySelectorAll(".shape").forEach(s=>{
      const d=+s.dataset.depth||0;
      s.style.setProperty("--px",(tx*d).toFixed(2)+"px");
      s.style.setProperty("--py",(ty*d).toFixed(2)+"px");
    });
    if(Math.abs(mx-tx)>0.001||Math.abs(my-ty)>0.001){ requestAnimationFrame(loop); } else { ticking=false; }
  }
}

/* ─────────── controls ─────────── */
document.getElementById("lens").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.lens=b.dataset.lens;
  document.querySelectorAll("#lens button").forEach(x=>x.setAttribute("aria-pressed", x===b));
  render();
});
document.getElementById("lang").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.lang=b.dataset.lang;
  document.querySelectorAll("#lang button").forEach(x=>x.setAttribute("aria-pressed", x===b));
  render();
});
// interactive-map overlay (lazy iframe stays inert until activated)
document.addEventListener("click",(e)=>{
  const ov = e.target.closest(".map-overlay");
  if(ov){
    const coarse = window.matchMedia("(hover: none), (pointer: coarse)").matches;
    if(coarse){ window.open(ov.dataset.map, "_blank", "noopener"); return; }
    ov.closest(".map-holder").classList.add("active");
    return;
  }
  const lk = e.target.closest(".map-lock");
  if(lk){ lk.closest(".map-holder").classList.remove("active"); }
});

document.getElementById("theme").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const sysDark=window.matchMedia("(prefers-color-scheme:dark)").matches;
  const now = cur ? cur : (sysDark?"dark":"light");
  const next = now==="dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  document.getElementById("theme").setAttribute("aria-pressed", next==="dark");
});

render();
