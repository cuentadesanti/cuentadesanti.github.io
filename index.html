  const linkLabel = {en:{pending:"Repository (publishing soon)",priv:"Private — case study"},
                     es:{pending:"Repositorio (por publicar)",priv:"Privado — case study"}};

  document.getElementById("list").innerHTML = items.map((p,i)=>{
    const num = String(i+1).padStart(2,"0");
    const fig = p.fig? `<figure class="figure"><img src="${p.fig}" alt="" loading="lazy"><figcaption>${p.figcap[L]}</figcaption></figure>`:"";
    const tags = p.tags.map(x=>`<span class="tag">${x}</span>`).join("");
    const links = p.links.map(x=>{
      if(x.lock) return `<span class="lock">${linkLabel[L].priv}</span>`;
      const label = x.pending? linkLabel[L].pending : x.t;
      return `<a href="${x.h}" target="_blank" rel="noopener">${label}</a>`;
    }).join("");
    return `<article class="proj">
      <div class="num">${num} / ${String(items.length).padStart(2,"0")}</div>
      <div class="body">
        <div class="ptop"><h3 class="ptitle">${p.title}</h3><span class="year">${p.year}</span></div>
        <p class="line">${p.line[L][X]}</p>
        <p class="blurb">${p.blurb[L]}</p>
        <div class="tags">${tags}</div>
        <div class="links">${links}</div>
        ${fig}
      </div>
    </article>`;
  }).join("");

  document.getElementById("also").innerHTML = ALSO.map(a=>
    `<a href="${a.h}" target="_blank" rel="noopener"><div class="row"><span class="n">${a.n}</span><span class="d">${a.d[L]}</span></div></a>`
  ).join("");
}

// controls
document.getElementById("lens").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.lens=b.dataset.lens;
  document.querySelectorAll("#lens button").forEach(x=>x.setAttribute("aria-pressed",x===b));
  render();
});
document.getElementById("lang").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.lang=b.dataset.lang;
  document.querySelectorAll("#lang button").forEach(x=>x.setAttribute("aria-pressed",x===b));
  render();
});
document.getElementById("theme").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const sysDark=window.matchMedia("(prefers-color-scheme:dark)").matches;
  const now = cur? cur : (sysDark?"dark":"light");
  document.documentElement.setAttribute("data-theme", now==="dark"?"light":"dark");
});

render();
</script>
</body>
</html>
